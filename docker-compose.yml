name: Healthcare Management Portal CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Download AWS RDS SSL Certificate
      # AWS RDS requires this for secure encrypted connections
      run: curl -s https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -o backend/global-bundle.pem

    - name: Run Cloud Database Migrations
      # This step maps GitHub Secrets to Environment Variables
      env:
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: 5432
      run: |
        cd backend
        python manage.py migrate