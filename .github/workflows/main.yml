name: Hospital Management CI/CD

on:
  push:
    branches: [ master ] # Execution: Triggers on every push to your master branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Execution: Temporary PostgreSQL instance for the migration check
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hospital_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      # Execution: Ensuring the DB is ready before backend steps run
      options: >-
        --health-cmd pg_isready
        --health-interval 10s
        --health-timeout 5s
        --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt # Execution: Installs Django and PostgreSQL drivers

      - name: Run Django Migrations
        env:
          # Change "db" to "localhost" to match the GitHub service mapping
          DATABASE_URL: postgres://user:password@localhost:5432/hospital_db
        run: |
          cd backend/core
          python manage.py migrate

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps # Execution: Fixes common dependency conflicts in CI

      - name: Build Frontend
        run: |
          cd frontend
          npm run build # Execution: Compiles React for production to catch syntax errors